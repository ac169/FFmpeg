name: Manual Create Release

on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: 'Upload URLs (,)'
        required: true
      tag_name:
        description: 'Tag'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download and Clean
        env:
          URL_INPUT: ${{ github.event.inputs.file_urls }}
          PRIVATE_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          mkdir -p ./downloads
          
          CLEAN_STR=$(echo "$URL_INPUT" | tr -d '[:space:]\r\n')
          echo "CLEAN_STR: $CLEAN_STR"

          IFS=',' read -ra ADDR <<< "$CLEAN_STR"
          for url in "${ADDR[@]}"; do
            [ -z "$url" ] && continue
            
            filename=$(basename "${url%%\?*}")
            echo "--------------------------------"
            echo "Downloading...: $filename"
            
            curl -H "Authorization: token $PRIVATE_TOKEN" \
                 -H "Accept: application/octet-stream" \
                 -L -f -s -S \
                 -o "./downloads/$filename" \
                 "$url" || echo "Failed to download: $url"
          done

          ls -R ./downloads

      - name: Create and Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: ./downloads/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
