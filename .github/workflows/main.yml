name: Manual Private File Release
on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '私有库文件 URLs (每行一个)'
        required: true
      tag_name:
        description: '发布到本仓库的 Tag'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download Multiple Files
        env:
          # 关键：先将 inputs 存入环境变量，避免 shell 注入和换行符丢失
          RAW_URLS: ${{ github.event.inputs.file_urls }}
          PRIVATE_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          mkdir -p ./downloads
          
          # 1. 强力清洗：删除所有空格、换行符和回车符
          # 确保输入变成纯粹的 url1,url2,url3 格式
          CLEAN_INPUT=$(echo "$RAW_INPUT" | tr -d '[:space:]\r\n')
          
          echo "--- 待下载列表（逗号分割） ---"
          echo "$CLEAN_INPUT"
          echo "---------------------------"

          # 2. 将逗号替换为空格，循环处理每一个 URL
          # 使用 IFS=',' 读取可以完美处理逗号分隔符
          IFS=',' read -ra ADDR <<< "$CLEAN_INPUT"
          for url in "${ADDR[@]}"; do
            [ -z "$url" ] && continue
            
            # 提取文件名（去除 ? 后的参数）
            # 例如: https://.../file.zip?token=xxx -> file.zip
            filename=$(basename "${url%%\?*}")
            
            echo "开始下载: $filename"
            
            # 3. 执行下载，使用 -f 确保 HTTP 错误时返回非零状态
            curl -H "Authorization: token $PRIVATE_TOKEN" \
                 -L -f -s -S \
                 -o "./downloads/$filename" \
                 "$url"

            if [ $? -eq 0 ]; then
               echo "✅ 成功: $filename"
            else
               echo "❌ 失败: $url (请检查地址或 Token 权限)"
            fi
          done

      - name: Check Downloads
        run: ls -lh ./downloads

      - name: Create and Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: ./downloads/*
          generate_release_notes: true
        env:
          # 这里使用默认的 GITHUB_TOKEN 即可发布到当前仓库
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
