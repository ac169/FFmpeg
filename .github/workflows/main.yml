name: Manual Sync Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download from Private Repo
        env:
          GH_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
          REMOTE_REPO: "ac169/FFmpeg-Builds-Legacy"
        run: |
          mkdir -p ./downloads
          TAG_NAME="${{ github.event.inputs.tag_name }}"

          # 1. 抓取标题 (使用 EOF 确保支持空格和特殊字符)
          echo "RELEASE_TITLE<<EOF" >> $GITHUB_ENV
          gh release view "$TAG_NAME" --repo "$REMOTE_REPO" --json title -q .title >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # 2. 抓取正文
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          gh release view "$TAG_NAME" --repo "$REMOTE_REPO" --json body -q .body >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # 3. 下载 Assets
          gh release download "$TAG_NAME" --repo "$REMOTE_REPO" --dir ./downloads --clobber

      - name: Create and Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ env.RELEASE_TITLE }}  # 这里显式指定标题
          body: ${{ env.RELEASE_BODY }}   # 这里显式指定正文
          files: ./downloads/*
          generate_release_notes: false   # 必须设为 false，否则会覆盖我们抓取的 body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
