name: Manual Private File Release
on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '私有库文件 URLs (每行一个)'
        required: true
      tag_name:
        description: '发布到本仓库的 Tag'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download Private Files
        env:
          # 使用具有源私有库读取权限的 PAT
          PRIVATE_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          mkdir -p ./downloads
          # 处理输入的 URL 列表
          echo "${{ github.event.inputs.file_urls }}" > urls.txt
          
          while IFS= read -r url || [ -n "$url" ]; do
            [ -z "$url" ] && continue
            echo "正在授权下载: $url"
            
            # 关键：添加 Authorization Header
            # -J 使用服务器提供文件名, -L 跟随重定向
            curl -H "Authorization: token $PRIVATE_TOKEN" \
                 -L -J -O --output-dir ./downloads "$url"
          done < urls.txt

      - name: Check Downloads
        run: ls -lh ./downloads

      - name: Create and Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: ./downloads/*
          generate_release_notes: true
        env:
          # 这里使用默认的 GITHUB_TOKEN 即可发布到当前仓库
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
