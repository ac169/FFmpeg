name: Manual Sync Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download from Private Repo
        env:
          # 关键：gh 命令会自动识别这个变量名作为身份验证
          GH_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
          REMOTE_REPO: "ac169/FFmpeg-Builds-Legacy"
        run: |
          mkdir -p ./downloads
          
          # 1. 抓取源 Release 的标题和正文 (用于同步信息)
          # 使用 --json 提取并存入环境变量
          # 1. 抓取标题 (使用 EOF 确保支持空格和特殊字符)
          echo "RELEASE_TITLE<<EOF" >> $GITHUB_ENV
          gh release view "$TAG_NAME" --repo "$REMOTE_REPO" --json title -q .title >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # 2. 抓取正文
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          gh release view "$TAG_NAME" --repo "$REMOTE_REPO" --json body -q .body >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # 2. 直接下载所有 Assets (gh 默认不下载 Source code)
          gh release download ${{ github.event.inputs.tag_name }} \
             --repo $REMOTE_REPO \
             --dir ./downloads \
             --clobber

          ls -R ./downloads

      - name: Create and Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ env.RELEASE_TITLE }}
          body: ${{ env.RELEASE_BODY }}
          files: ./downloads/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
