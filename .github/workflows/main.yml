name: Manual Private File Release
on:
  workflow_dispatch:
    inputs:
      file_urls:
        description: '私有库文件 URLs (每行一个)'
        required: true
      tag_name:
        description: '发布到本仓库的 Tag'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download Multiple Files
        env:
          # 关键：先将 inputs 存入环境变量，避免 shell 注入和换行符丢失
          RAW_URLS: ${{ github.event.inputs.file_urls }}
          PRIVATE_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          mkdir -p ./downloads
          
          # 1. 使用 EOF 方式将环境变量写入文件，这能完美保留换行
          cat <<EOF > urls.txt
          $RAW_URLS
          EOF

          # 2. 逐行读取并清理（去除首尾空格、回车符 \r 和空行）
          # 特别注意：Windows 粘贴过来的文本可能带有 \r，必须删掉
          sed -i 's/\r//g; /^$/d; s/^[[:space:]]*//; s/[[:space:]]*$//' urls.txt

          echo "--- 待下载列表 ---"
          cat urls.txt
          echo "------------------"

          while IFS= read -r url; do
            [ -z "$url" ] && continue
            
            # 提取文件名（过滤掉 URL 参数）
            clean_url=$(echo "$url" | cut -d'?' -f1)
            filename=$(basename "$clean_url")
            
            echo "开始下载: $filename"
            
            # 执行下载，务必加双引号包裹 "$url"
            curl -H "Authorization: token $PRIVATE_TOKEN" \
                 -L -o "./downloads/$filename" \
                 "$url"

            if [ $? -eq 0 ]; then
               echo "✅ 成功: $filename"
            else
               echo "❌ 失败: $url"
            fi
          done < urls.txt

      - name: Check Downloads
        run: ls -lh ./downloads

      - name: Create and Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: ./downloads/*
          generate_release_notes: true
        env:
          # 这里使用默认的 GITHUB_TOKEN 即可发布到当前仓库
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
